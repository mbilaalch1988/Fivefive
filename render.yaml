services:
  - type: web
    name: sequence
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
      # Optional: set this in the Render dashboard to enable scoreboard persistence.
      # Format: postgresql://postgres:<password>@db.<project-ref>.supabase.co:5432/postgres
      - key: DATABASE_URL
        sync: false
      # Optional: enable Google OAuth sign-in (see README for setup).
      # Both must be set together. Anon key is public; safe in client bundle.
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      # Optional: enables tying signed-in player stats to the Supabase user_id.
      # Find at Supabase → Settings → API → JWT Secret. Server-only secret.
      - key: SUPABASE_JWT_SECRET
        sync: false
      # Optional: enables Web Push "It's your turn" notifications.
      # Generate locally once with:  npx web-push generate-vapid-keys
      # Then set all three in the Render dashboard.
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        sync: false
