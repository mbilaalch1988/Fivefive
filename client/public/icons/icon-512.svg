<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Fivefive "55" mark. Maskable: content stays within central 410x410 (80%). -->
  <rect width="512" height="512" fill="#0a1840"/>
  <!-- Gold rounded square (mark body) -->
  <rect x="76" y="76" width="328" height="328" rx="80" ry="80"
        fill="#e4c373" stroke="#060d2a" stroke-width="14"/>
  <!-- "55" numerals — Fredoka 500, navy. -->
  <text x="256" y="332" text-anchor="middle"
        font-family="Fredoka, 'Inter', system-ui, sans-serif"
        font-weight="500"
        font-size="220"
        letter-spacing="-9"
        fill="#0a1840">55</text>
  <!-- Coral accent dot, top-right corner. -->
  <circle cx="416" cy="96" r="36" fill="#fb7185" stroke="#060d2a" stroke-width="12"/>
</svg>
