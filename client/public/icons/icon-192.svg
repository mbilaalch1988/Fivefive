<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <!-- Fivefive "55" mark. Maskable: content stays within central 154x154 (80%). -->
  <rect width="192" height="192" fill="#0a1840"/>
  <!-- Gold rounded square (mark body) -->
  <rect x="28" y="28" width="124" height="124" rx="30" ry="30"
        fill="#e4c373" stroke="#060d2a" stroke-width="6"/>
  <!-- "55" numerals — Fredoka 500, navy. -->
  <text x="96" y="124" text-anchor="middle"
        font-family="Fredoka, 'Inter', system-ui, sans-serif"
        font-weight="500"
        font-size="84"
        letter-spacing="-3.4"
        fill="#0a1840">55</text>
  <!-- Coral accent dot, top-right corner. -->
  <circle cx="156" cy="36" r="14" fill="#fb7185" stroke="#060d2a" stroke-width="5"/>
</svg>
